services:
  # Backend API Service
  - type: web
    name: synergyfit-api
    env: node
    region: oregon
    # 'starter' (always-on) — 'free' spins down on idle, which breaks the MCP
    # OAuth flow (Claude's ~10s endpoint timeout exceeds cold-start time).
    plan: starter
    buildCommand: npm install --prefix backend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: HOST
        value: 0.0.0.0
      - key: MONGODB_URI
        sync: false  # Will be set manually for security
      - key: JWT_SECRET
        sync: false  # Will be set manually for security
      - key: JWT_EXPIRE
        value: 7d
      - key: CORS_ORIGIN
        sync: false  # Will be set to frontend URL after frontend deploys
      - key: CORS_CREDENTIALS
        value: true
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: COMPRESSION_LEVEL
        value: 6
      - key: REQUEST_TIMEOUT
        value: 30000
      - key: HEALTH_CHECK_ENABLED
        value: true
      - key: LOG_LEVEL
        value: info
      - key: DB_MAX_POOL_SIZE
        value: 10
      - key: DB_MIN_POOL_SIZE
        value: 2
      - key: TRUST_PROXY
        value: 1
      - key: SESSION_SECURE
        value: true
      - key: COOKIE_SECURE
        value: true
      - key: APP_VERSION
        value: 1.0.0
      # MCP connector (Claude custom connector). MCP_BASE_URL must equal this
      # service's public origin; the connector URL users add is ${MCP_BASE_URL}/mcp.
      - key: MCP_BASE_URL
        sync: false  # e.g. https://synergyfit-api.onrender.com
      - key: MCP_CONSENT_TICKET_SECRET
        sync: false  # distinct secret for signing consent tickets
      - key: MCP_ACCESS_TOKEN_TTL_SECONDS
        value: 3600
      - key: MCP_REFRESH_TOKEN_TTL_SECONDS
        value: 2592000
      - key: MCP_AUTH_CODE_TTL_SECONDS
        value: 600
      # Linear (site feedback → Linear issues)
      - key: LINEAR_API_KEY
        sync: false  # Will be set manually for security
      - key: LINEAR_TEAM_ID
        sync: false  # Target Linear team UUID
      - key: LINEAR_FEEDBACK_PROJECT_ID
        sync: false  # "Feedback Inbox" project UUID (optional)

  # Frontend Static Site
  - type: static
    name: synergyfit-app
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_ENV
        value: production
      - key: VITE_API_URL
        sync: false  # Will be set to backend URL after backend deploys
      - key: VITE_API_VERSION
        value: v1
      - key: VITE_APP_NAME
        value: SynergyFit
      - key: VITE_APP_VERSION
        value: 1.0.0
      - key: VITE_JWT_EXPIRE
        value: 7d
      - key: VITE_SESSION_TIMEOUT
        value: 3600000
      - key: VITE_BUILD_SOURCEMAP
        value: false
      - key: VITE_BUILD_MINIFY
        value: true
      - key: VITE_SECURE_COOKIES
        value: true
      - key: VITE_ENABLE_PWA
        value: true
      - key: VITE_ENABLE_ANALYTICS
        value: false
      - key: VITE_ENABLE_DEBUG
        value: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
  # Weekly resolver for skeleton training plans (Stage 3 auto-resolution).
  # Calls the ai-coach service's internal endpoint every Sunday 06:00 UTC:
  # advances plan weeks, materializes upcoming weeks from real adherence, and
  # schedules them. AI_COACH_URL + INTERNAL_API_KEY are set in the dashboard
  # (the ai-coach service itself is deployed out-of-band, not via this file).
  - type: cron
    name: ai-coach-weekly-resolver
    env: node
    schedule: "0 6 * * 0"
    buildCommand: "true"
    startCommand: >-
      curl -sS -X POST "$AI_COACH_URL/api/v1/internal/resolve-weeks"
      -H "X-Internal-Key: $INTERNAL_API_KEY" --max-time 300 --fail-with-body
    envVars:
      - key: AI_COACH_URL
        sync: false  # e.g. https://<ai-coach-service>.onrender.com
      - key: INTERNAL_API_KEY
        sync: false  # must match the ai-coach service's INTERNAL_API_KEY
